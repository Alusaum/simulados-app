version: '3.9'

# ── Volumes persistentes ───────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ── Rede interna ───────────────────────────────────────────────────────────────
networks:
  simulados_net:
    driver: bridge

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       simulados
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - simulados_net
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - simulados_net
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  5

  # ── Django Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env.example
    environment:
      POSTGRES_HOST: db
      REDIS_URL:     redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: simulados.settings.development
    volumes:
      - ./backend:/app   # Hot reload em dev
    ports:
      - "8000:8000"
    networks:
      - simulados_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_simulados &&
             python manage.py runserver 0.0.0.0:8000"

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env.example
    environment:
      POSTGRES_HOST: db
      REDIS_URL:     redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: simulados.settings.development
    volumes:
      - ./backend:/app
    networks:
      - simulados_net
    depends_on:
      - backend
      - redis
    command: celery -A simulados worker --loglevel=info

  # ── Celery Beat (agendador) ───────────────────────────────────────────────────
  celery_beat:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env.example
    environment:
      POSTGRES_HOST: db
      REDIS_URL:     redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: simulados.settings.development
    volumes:
      - ./backend:/app
    networks:
      - simulados_net
    depends_on:
      - celery
    command: celery -A simulados beat --loglevel=info

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - simulados_net
    depends_on:
      - backend
    command: npm run dev

  # ── Nginx (reverse proxy) ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - simulados_net
    depends_on:
      - backend
      - frontend
