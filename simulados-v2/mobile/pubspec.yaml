name: simulaai
description: Plataforma de Simulados Online — App Mobile

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Estado ─────────────────────────────────────────────
  flutter_riverpod:   ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── HTTP ────────────────────────────────────────────────
  dio:                ^5.4.3
  pretty_dio_logger:  ^1.3.1

  # ── Banco Local (offline-first) ─────────────────────────
  sqflite:            ^2.3.3
  path:               ^1.9.0

  # ── Armazenamento Seguro (tokens) ───────────────────────
  flutter_secure_storage: ^9.0.0

  # ── Conectividade ───────────────────────────────────────
  connectivity_plus:  ^6.0.3

  # ── UI ─────────────────────────────────────────────────
  google_fonts:       ^6.2.1
  lucide_icons:       ^1.0.0

  # ── Utilitários ─────────────────────────────────────────
  intl:               ^0.19.0
  shared_preferences: ^2.2.3
  uuid:               ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:      ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner:       ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/
